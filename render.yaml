services:
  - type: web
    name: aerointel-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aerointel-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false

  - type: static
    name: aerointel-command-center
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false

databases:
  - name: aerointel-db
    databaseName: aerointel
    plan: free
